services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: clawdboard
      POSTGRES_USER: clawdboard
      POSTGRES_PASSWORD: clawdboard
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawdboard"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
